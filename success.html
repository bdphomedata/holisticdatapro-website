<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful | Holistic Data Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: #001f3f; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .success-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h2 { color: #4ade80; margin-bottom: 15px; font-weight: 300; }
        p { font-size: 0.95rem; opacity: 0.8; line-height: 1.6; margin-bottom: 25px; }
        .icon { font-size: 3rem; color: #ffc629; margin-bottom: 20px; }
        .login-btn { display: inline-block; width: 100%; padding: 15px; background: #4ade80; color: #001f3f; border: none; border-radius: 50px; font-weight: 800; text-decoration: none; transition: 0.3s; }
        .login-btn:hover { background: #38b368; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="success-card">
    <div class="icon"><i class="fas fa-check-circle"></i></div>
    <h2>Registration Successful!</h2>
    <p>Welcome to the Network. We have sent an email to your registered address containing your <strong>temporary password</strong>.</p>
    <p>Please check your inbox (and spam folder) to proceed.</p>
    <a href="login.html" class="login-btn">PROCEED TO LOGIN</a>
</div>
</body>
</html>
