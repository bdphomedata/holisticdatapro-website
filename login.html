<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Holistic Data Pro</title>
    <style>
        body { background: #001f3f; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0, 31, 63, 0.5); color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 50px; background: #0078d4; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #005a9e; }
        a { color: #4ade80; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Client Login</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn">LOG IN</button>
        </form>
        <p><a href="index.html">← Back to Home</a></p>
    </div>
</body>
</html>
