<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Holistic Data Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-blue-light: #0077c8;
            --brand-blue-dark: #001f3f;
            --brand-gold: #ffc629;
            --brand-green: #4ade80;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 31, 63, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
            background: var(--brand-blue-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- VIDEO BACKGROUND --- */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        #bg-video { min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0, 119, 200, 0.7) 0%, rgba(0, 31, 63, 0.9) 100%); z-index: -1; }

        /* --- NAVIGATION --- */
        nav { 
            width: 100%; 
            padding: 0.8rem 3%; 
            background: rgba(0, 31, 63, 0.4); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--glass-border); 
            z-index: 1000; 
        }
        .nav-container { 
            max-width: 1600px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center; 
            flex-wrap: wrap; gap: 15px;
        }
        .nav-left-group { display: flex; align-items: center; gap: 40px; }
        .logo-static { 
            font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; 
            background: linear-gradient(to bottom, #fff 0%, #e0e0e0 45%, var(--brand-green) 50%, #fff 55%, #b0b0b0 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0px 1px 0px #ffffff) drop-shadow(0px 3px 5px rgba(0,0,0,0.8)) drop-shadow(0px 0px 12px rgba(74, 222, 128, 0.4)); 
            display: inline-block; 
        }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a, .nav-links .dropdown-label { 
            color: #ffffff !important; text-decoration: none; font-weight: 600; 
            font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; opacity: 0.9; cursor: pointer;
        }
        .nav-links a:hover, .nav-links .dropdown:hover .dropdown-label { color: var(--brand-gold) !important; opacity: 1; }

        .dropdown { position: relative; display: inline-block; padding: 10px 0; }
        .dropdown-content { 
            display: none; position: absolute; background: rgba(0, 31, 63, 0.95); min-width: 240px; 
            border-top: 3px solid var(--brand-gold); top: 100%; left: 0; backdrop-filter: blur(20px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 10px 0; z-index: 1001;
        }
        .dropdown:hover .dropdown-content { display: block; animation: fadeIn 0.3s ease; }
        .dropdown-content a { display: block; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem !important; }
        
        .nav-buttons { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .nav-btn-green { text-decoration: none; padding: 6px 14px; border-radius: 50px; border: 2px solid var(--brand-green); color: white !important; font-weight: 700; font-size: 0.65rem; transition: all 0.3s ease; text-transform: uppercase; white-space: nowrap; }
        .nav-btn-green:hover { background: rgba(74, 222, 128, 0.15); box-shadow: 0 0 10px rgba(74, 222, 128, 0.4); transform: translateY(-1px); }
        .nav-btn-active { border-color: var(--brand-gold); color: var(--brand-gold) !important; }

        /* --- CONTACT CONTENT --- */
        .contact-section { padding: 80px 5%; flex: 1; display: flex; align-items: center; justify-content: center; }
        .contact-container {
            max-width: 800px; width: 100%; text-align: center;
            background: rgba(0, 31, 63, 0.65); padding: 40px;
            border-radius: 25px; border: 1px solid rgba(74, 222, 128, 0.3);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .section-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 3px; }
        .section-subtitle { font-size: 0.9rem; color: var(--brand-green); font-weight: 700; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .contact-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 2; }

        label { font-size: 0.7rem; font-weight: 800; color: var(--brand-gold); text-transform: uppercase; letter-spacing: 1.5px; }

        input, textarea {
            background: var(--input-bg); border: 1px solid var(--glass-border);
            padding: 14px; border-radius: 10px; color: white;
            font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none; border-color: var(--brand-green);
            background: rgba(0, 31, 63, 0.9); box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .submit-btn {
            grid-column: span 2; padding: 16px;
            background: var(--brand-gold); color: #001f3f;
            font-weight: 900; border: none; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;
        }
        .submit-btn:hover { background: #ffd65c; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 198, 41, 0.4); }

        /* --- THE WHATSAPP FACTOR --- */
        .whatsapp-bridge {
            margin-top: 35px; padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .wa-text { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--brand-green); font-weight: 800; opacity: 0.8; }
        .wa-btn {
            display: inline-flex; align-items: center; gap: 12px;
            background: #25D366; color: white; padding: 12px 30px;
            border-radius: 50px; text-decoration: none; font-weight: 800;
            font-size: 0.85rem; transition: all 0.3s ease; text-transform: uppercase;
        }
        .wa-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(37, 211, 102, 0.5); }

        footer { padding: 20px; background: #000b1a; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.4); border-top: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 800px) {
            .contact-form { grid-template-columns: 1fr; }
            .form-group.full-width, .submit-btn { grid-column: span 1; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
