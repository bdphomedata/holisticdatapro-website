<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | Holistic Data Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* MODERN RESET & VARIABLES */
        :root {
            --brand-blue-light: #0077c8;
            --brand-blue-dark: #001f3f;
            --brand-gold: #ffc629;
            --brand-green: #4ade80;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
            background: var(--brand-blue-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- VIDEO BACKGROUND --- */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
        }
        #bg-video {
            min-width: 100%; min-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover;
        }
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0, 119, 200, 0.7) 0%, rgba(0, 31, 63, 0.9) 100%);
            z-index: -1; 
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%;
            padding: 0.8rem 3%;
            background: rgba(0, 31, 63, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1600px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px;
        }

        .nav-left-group { display: flex; align-items: center; gap: 40px; }

        .logo-static { 
            font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #e0e0e0 45%, var(--brand-green) 50%, #fff 55%, #b0b0b0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 1px 0px #ffffff) drop-shadow(0px 3px 5px rgba(0,0,0,0.8)) drop-shadow(0px 0px 12px rgba(74, 222, 128, 0.4));
            display: inline-block;
        }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a, .nav-links .dropdown-label { 
            color: #ffffff !important; text-decoration: none; font-weight: 600; 
            font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; opacity: 0.9; 
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links .dropdown:hover .dropdown-label { color: var(--brand-gold) !important; opacity: 1; }

        .dropdown { position: relative; display: inline-block; padding: 10px 0; }
        .dropdown-content { 
            display: none; position: absolute; background: rgba(0, 31, 63, 0.95); min-width: 240px; 
            border-top: 3px solid var(--brand-gold); top: 100%; left: 0; backdrop-filter: blur(20px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 10px 0; z-index: 1001;
        }
        .dropdown:hover .dropdown-content { display: block; animation: fadeIn 0.3s ease; }
        .dropdown-content a { display: block; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem !important; }
        .dropdown-content a i { margin-right: 10px; color: var(--brand-green); width: 15px; text-align: center; }

        .dropdown-header { padding: 10px 20px 5px 20px; font-size: 0.6rem; color: var(--brand-green); letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }

        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-btn-green { text-decoration: none; padding: 6px 14px; border-radius: 50px; border: 2px solid var(--brand-green); color: white !important; font-weight: 700; font-size: 0.65rem; transition: all 0.3s ease; text-transform: uppercase; white-space: nowrap; }
        .nav-btn-green:hover { background: rgba(74, 222, 128, 0.15); box-shadow: 0 0 10px rgba(74, 222, 128, 0.4); transform: translateY(-1px); }

        /* --- MAIN CONTENT & FORM --- */
        .main-content {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 60px 5%;
        }

        .subscribe-card { 
            background: var(--glass-bg); backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); 
            padding: 40px; border-radius: 20px; 
            width: 100%; max-width: 500px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }

        h2 { color: var(--brand-green); margin-bottom: 5px; font-weight: 300; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .flex-row { display: flex; gap: 15px; }
        
        label { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; color: var(--brand-gold); letter-spacing: 1px; }

        input, select { 
            width: 100%; padding: 12px; background: rgba(0, 31, 63, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; 
            color: white; font-size: 0.95rem; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--brand-green); box-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        select option { background: #001f3f; color: white; }

        .sub-btn { 
            width: 100%; padding: 15px; background: var(--brand-green); 
            color: #001f3f; border: none; border-radius: 50px; 
            font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase;
        }

        .sub-btn:hover { background: #38b368; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(74, 222, 128, 0.3); }

        footer { padding: 20px; background: #000b1a; text-align: center; font-size: 0.65rem; color: rgba(255,255,255,0.4); }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 900px) {
            .nav-container { justify-content: center; }
            .nav-left-group { flex-direction: column; gap: 10px; }
            .nav-buttons { 
                display: grid; grid-template-columns: 1fr 1fr; 
                gap: 12px; width: 100%; max-width: 500px; margin-top: 10px;
            }
            .nav-btn-green { text-align: center; padding: 10px; font-size: 0.6rem; }
        }

        @media (max-width: 480px) {
            .logo-static { font-size: 1.4rem; letter-spacing: 2px; }
            .flex-row { flex-direction: column; gap: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="assets/video/WebsiteVideo.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <nav>
        <div class="nav-container">
            <div class="nav-left-group">
                <span class="logo-static">HOLISTIC DATA PRO</span>
                <div class="nav-links">
                    <div class="dropdown">
                        <span class="dropdown-label">SERVICES <i class="fas fa-caret-down"></i></span>
                        <div class="dropdown-content">
                            <div class="dropdown-header">Tailored for:</div>
                            <a href="services-home.html"><i class="fas fa-home"></i> HOME USERS</a>
                            <a href="services-corporate.html"><i class="fas fa-building"></i> SME & CORPORATE</a>
                        </div>
                    </div>
                    <a href="solutions.html">SOLUTIONS</a>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn-green">HOME</a>
                <a href="subscribe.html" class="nav-btn-green">SUBSCRIBE</a>
                <a href="login.html" class="nav-btn-green">LOGIN</a>
                <a href="contact.html" class="nav-btn-green">CONNECT WITH ME</a>
                <a href="Bartus-de-Paiva-CV.docx" class="nav-btn-green" download>DOWNLOAD PROFILE</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="subscribe-card">
            <i class="fas fa-envelope-open-text" style="font-size: 2.5rem; color: var(--brand-gold); margin-bottom: 15px;"></i>
            <h2>Join the Network</h2>
            <p>Complete your profile to receive tailored BI insights.</p>

            <form action="https://www.holisticdatapro.com/subscribe_process.php" method="POST">
                <div class="flex-row">
                    <div class="input-group" style="flex: 1;">
                        <label>Name</label>
                        <input type="text" name="first_name" placeholder="First Name" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Surname</label>
                        <input type="text" name="surname" placeholder="Surname" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="example@holisticpro.com" required>
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Ethnic Group</label>
                    <input type="text" name="ethnic_group" placeholder="e.g. Caucasian, African, etc." required>
                </div>

                <div class="input-group">
                    <label>Country</label>
                    <input type="text" name="country" placeholder="e.g. South Africa" required>
                </div>

                <button type="submit" class="sub-btn">ACTIVATE SUBSCRIPTION</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Holistic Data Pro. All rights reserved.</p>
    </footer>

</body>
</html>
