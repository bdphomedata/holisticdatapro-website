<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | Holistic Data Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: #001f3f; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .subscribe-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h2 { color: #4ade80; margin-bottom: 5px; font-weight: 300; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .flex-row { display: flex; gap: 15px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; color: #ffc629; letter-spacing: 1px; }
        input, select { width: 100%; padding: 10px; background: rgba(0, 31, 63, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; font-size: 0.95rem; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: #4ade80; }
        select option { background: #001f3f; color: white; }
        .sub-btn { width: 100%; padding: 15px; background: #4ade80; color: #001f3f; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .sub-btn:hover { background: #38b368; transform: translateY(-2px); }
        .back-link { display: block; margin-top: 20px; color: white; text-decoration: none; font-size: 0.8rem; opacity: 0.6; }
        .back-link:hover { opacity: 1; color: #ffc629; }
    </style>
</head>
<body>
<div class="subscribe-card">
    <i class="fas fa-envelope-open-text" style="font-size: 2.5rem; color: #ffc629; margin-bottom: 15px;"></i>
    <h2>Join the Network</h2>
    <p>Complete your profile to receive tailored BI insights.</p>

    <form action="https://websitesubscription-e7ehe3evgme8h8e7.westeurope-01.azurewebsites.net/subscribe_process.php" method="POST">
        <div class="flex-row">
            <div class="input-group" style="flex: 1;">
                <label>Name</label>
                <input type="text" name="first_name" placeholder="Name" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Surname</label>
                <input type="text" name="surname" placeholder="Surname" required>
            </div>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@holisticpro.com" required>
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="input-group">
            <label>Ethnic Group</label>
            <input type="text" name="ethnic_group" placeholder="e.g. Caucasian, African, etc." required>
        </div>
        <div class="input-group">
            <label>Country</label>
            <input type="text" name="country" placeholder="e.g. South Africa" required>
        </div>
        <button type="submit" class="sub-btn">ACTIVATE SUBSCRIPTION</button>
    </form>
    <a href="index.html" class="back-link">← Return to Main Portal</a>
</div>
</body>
</html>
