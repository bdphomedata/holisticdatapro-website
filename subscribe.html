<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | Holistic Data Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS variables and Reset same as index.html */
        :root {
            --brand-blue-light: #0077c8;
            --brand-blue-dark: #001f3f;
            --brand-gold: #ffc629;
            --brand-green: #4ade80;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #001f3f;
        }

        /* --- BACKGROUND --- */
        .video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden;
        }
        #bg-video {
            min-width: 100%; min-height: 100%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); object-fit: cover;
        }
        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0, 119, 200, 0.7) 0%, rgba(0, 31, 63, 0.9) 100%);
            z-index: -1; 
        }

        /* --- NAVIGATION (Exactly same as index.html) --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 2%; background: rgba(0, 31, 63, 0.3);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: 1.5px; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a { color: #ffffff !important; text-decoration: none; font-size: 0.9rem; font-weight: 600; opacity: 0.9; }
        
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-btn {
            text-decoration: none; padding: 10px 20px; border-radius: 50px;
            font-weight: 700; font-size: 0.8rem; transition: all 0.3s ease;
        }
        .nav-btn-green {
            background-color: transparent; border: 2px solid var(--brand-green); color: white !important;
        }
        .nav-btn-green:hover {
            background-color: rgba(74, 222, 128, 0.1);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
            transform: translateY(-2px);
        }

        /* --- MOBILE 2x2 GRID LOGIC --- */
        @media (max-width: 1200px) {
            nav { flex-direction: column; gap: 20px; padding: 20px 5%; }
            .nav-buttons { 
                display: grid; grid-template-columns: 1fr 1fr; 
                gap: 12px; width: 100%; max-width: 450px; margin: 10px auto 0; 
            }
            .nav-btn { padding: 12px 10px; font-size: 0.75rem; text-align: center; }
        }

        /* --- FORM STYLES --- */
        .form-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 40px 5%;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 15px;
            width: 100%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h2 { color: var(--brand-green); margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 31, 63, 0.5); color: white;
            font-size: 1rem;
        }
        input:focus { outline: 2px solid var(--brand-green); background: rgba(0, 31, 63, 0.8); }
        
        .submit-btn {
            width: 100%; padding: 15px; border-radius: 8px;
            background: var(--brand-green); color: #001f3f;
            border: none; font-weight: 800; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .submit-btn:hover { background: #3cc672; transform: scale(1.02); }

        footer { padding: 30px 5%; background: #000b1a; text-align: center; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="assets/video/WebsiteVideo.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <nav>
        <div class="nav-left">
            <div class="logo">HOLISTIC DATA PRO</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
            </div>
        </div>
        <div class="nav-buttons">
            <a href="subscribe.html" class="nav-btn nav-btn-green">SUBSCRIBE</a>
            <a href="login.html"     class="nav-btn nav-btn-green">LOGIN</a>
            <a href="contact.html"   class="nav-btn nav-btn-green">CONNECT WITH ME</a>
            <a href="Profile.pdf"    class="nav-btn nav-btn-green" download>DOWNLOAD PROFILE</a>
        </div>
    </nav>

    <div class="form-container">
        <div class="glass-card">
            <h2>Subscribe to Intelligence</h2>
            <p>Get curated insights on BI automation and legacy reverse engineering.</p>
            <form action="api/subscribe_process.php" method="POST">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" required placeholder="Bartus de Paiva">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="name@company.com">
                </div>
                <button type="submit" class="submit-btn">Join the Network</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Holistic Data Pro. All rights reserved.</p>
    </footer>

</body>
</html>
